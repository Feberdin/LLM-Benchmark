# Purpose: Voice gateway routing benchmark for deterministic classification of common utterances.
# Input/Output: Expects strict JSON with one route value per utterance key.
# Invariants: Each utterance must map to exactly one supported route and prefix-based intents should stay stable.
# Debugging: Misroutes are easiest to spot in the exact JSON values for u1-u5.

test_case_id: "vg-routing-matrix"
category: "classification"
title: "Voice gateway routing matrix"
description: "Checks whether free-form and prefix-driven Alexa-style utterances map to the correct voice gateway route."
prompt_file: "fixtures/vg_routing_matrix.txt"
expected_format: "json"
response_format:
  type: "json_object"
validation_rules:
  json_schema_file: "fixtures/route_matrix_schema.json"
  expected_json_values:
    u1: "secondbrain"
    u2: "home_assistant"
    u3: "docker"
    u4: "troubleshooting"
    u5: "latest_mail"
tags: ["voice_gateway", "routing", "classification"]
suites: ["voice_gateway"]
max_output_tokens: 180
repetitions_default: 2
