name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Python tests and packaging checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Run pytest
        run: pytest -q

      - name: Validate example configuration
        run: benchmark validate-config --config fixtures/config/config.example.yaml

      - name: Smoke-check dashboard fixtures
        run: benchmark list-tests --tests-dir fixtures/tests --suite quick_compare

  container:
    name: Docker image build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ghcr.io/feberdin/llm-benchmark:ci
          build-args: |
            VERSION=0.2.0
