    </linearGradient>
    <linearGradient id="accent" x1="112" y1="120" x2="400" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5CA8"/>
      <stop offset="0.55" stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#FF9A3C"/>
    </linearGradient>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="96" fill="url(#bg)"/>
  <rect x="44" y="44" width="424" height="424" rx="80" stroke="#2A3558" stroke-width="8"/>

