<!--
Purpose: Lightweight public icon for GitHub raw delivery, GHCR metadata references and the Unraid template.
Input/Output: Static SVG asset rendered by browsers or Docker template UIs.
Important invariants: Keep the file self-contained and text-based so it is easy to version, review and replace later.
How to debug: Open the raw GitHub URL or the local file in a browser if the Unraid template shows no icon.
-->
